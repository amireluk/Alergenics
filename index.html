<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alergenics - מעקב אלרגנים</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Alergenics</h1>
            <p class="subtitle">מעקב אלרגנים יומי</p>
        </header>

        <main>
            <!-- Agenda View -->
            <section id="view-agenda" class="card">
                <h2>מה בתפריט?</h2>
                <div id="pending-list" class="list-container">
                    <p class="empty-msg">אין אלרגנים במעקב. עברו לניהול כדי להתחיל!</p>
                </div>
            </section>

            <!-- Track Management View -->
            <section id="view-track" class="card hidden">
                <div class="track-header">
                    <h2>ניהול מעקב</h2>
                </div>
                
                <div id="master-list-container" class="allergen-grid">
                    <!-- Grid of MoH allergen buttons will be injected here -->
                </div>

                <div class="manage-footer">
                    <button id="btn-finish-manage" class="btn-primary">סיום</button>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="bottom-nav">
            <button class="nav-item active" data-target="agenda">
                <span class="nav-icon">📋</span>
                <span class="nav-label">התפריט</span>
            </button>
            <button class="nav-item" data-target="track">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">ניהול</span>
            </button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
