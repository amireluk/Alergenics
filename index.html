<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alergenics - מעקב אלרגנים</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Alergenics</h1>
            <p class="subtitle">מעקב אלרגנים יומי <span class="version-tag">v1.2.10</span></p>
        </header>

        <main id="main-content">
            <!-- Agenda View -->
            <section id="view-agenda" class="card">
                <h2>מה אוכלים היום?</h2>
                <div id="pending-list" class="list-container">
                    <p class="empty-msg">אין אלרגנים במעקב. עברו להגדרות כדי להתחיל!</p>
                </div>
            </section>

            <!-- Track Management View -->
            <section id="view-track" class="card hidden">
                <div class="track-header" style="flex-direction: column; align-items: center;">
                    <h2 style="margin-bottom: 0.2rem; border-bottom: none;">ניהול מעקב</h2>
                    <p id="tracked-count" style="margin: 0 0 1rem 0; color: var(--text-light); font-size: 0.85rem; font-weight: 600;"></p>
                </div>
                
                <div id="master-list-container" class="allergen-grid">
                    <!-- Grid of MoH allergen buttons will be injected here -->
                </div>

                <div class="manage-footer">
                    <button id="btn-finish-manage" class="btn-primary">אישור</button>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="bottom-nav">
            <button id="btn-open-settings" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">הגדרות</span>
            </button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
